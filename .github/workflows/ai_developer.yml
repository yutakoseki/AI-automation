name: AI Issue Worker

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    if: github.event.label.name == 'ai-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install aider-chat

      - name: Run AI Coder (Aider)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.AI_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="ai-feature/issue-${{ github.event.issue.number }}"
          git checkout -b $BRANCH_NAME

          aider --message "
          [SYSTEM INSTRUCTION: AUTONOMOUS MODE]
          - あなたはプロのエンジニアエージェントです。
          - もし必要なディレクトリやファイル、雛形コードが存在しない場合は、ゼロからすべて新規作成してください。
          - 人間への確認（確認入力の要求）は一切行わないでください。
          - Issueで要求されている技術（Next.js等）のベストプラクティスに従ってコードを書いてください。

          [TASK]
          Issueタイトル: ${{ github.event.issue.title }}
          Issue本文:
          ${{ github.event.issue.body }}

          [OUTPUT REQUIREMENTS]
          - 新しいファイルが必要な場合は、迷わず即座に作成してください。
          - 作成・修正するコードは、手抜きせず、完全に動作する状態に仕上げてください。
          - 最後に必ず実装した内容の要約（Summary）を英語または日本語で出力してください。
          " --yes --no-auto-commits

          # 認証URLの設定
          git remote set-url origin "https://x-access-token:${{ secrets.AI_PAT }}@github.com/${{ github.repository }}.git"

          # 未コミットの変更があればすべてステージング
          git add .

          # 【修正ポイント】AIが勝手にコミットしていても大丈夫なように、
          # 「まだコミットされていない差分」または「mainブランチとのコードの差分」があるかを両方チェックします
          if [ -n "$(git status --porcelain)" ] || [ -n "$(git diff origin/main HEAD)" ]; then
            
            # まだコミットされていない変更がある場合だけコミットを実行
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "feat: implemented by AI for Issue #${{ github.event.issue.number }}"
            fi
            
            # ブランチを強制プッシュ
            git push -f origin $BRANCH_NAME
            
            # サマリーの抽出（直近のコミットログ、またはAiderのログ）
            AI_SUMMARY=$(git log -1 --pretty=%B)
            
            # プルリクエストを作成
            export GH_TOKEN="${{ secrets.AI_PAT }}"
            gh pr create --title "[AI] ${{ github.event.issue.title }}" --body "
            ## 🎯 課題の概要
            Closes #${{ github.event.issue.number }}
            Issue 「${{ github.event.issue.title }}」の要望に基づき、AIが自律開発を行いました。
            
            ## 🛠️ 今回の具体的な修正点
            $AI_SUMMARY
            
            ## ⚠️ レビュアー（人間）への注意点・確認方法
            - AIが自動生成したコードです。意図通りのロジックやデザインになっているか、画面上の「Files changed」タブで最終確認をお願いします。
            " --base main --head $BRANCH_NAME || echo "PR is already created or updated."
          else
            echo "リポジトリ内に差分が全く検出されなかったため、PR作成をスキップします。"
            exit 0
          fi
