name: AI Issue Worker

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    if: github.event.label.name == 'ai-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # 正しくは python-version です！

      # 自律型AIエンジニア「Aider」のインストール
      - name: Install Aider
        run: pip install aider-chat

      # OpenAIキーを使って自動解決・自動コミットを実行
      - name: Run AI Coder (Aider)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="ai-feature/issue-${{ github.event.issue.number }}"
          git checkout -b $BRANCH_NAME

          aider --message "
          以下のGitHub Issueを解決するために、必要なコードを新規作成または修正してください。

          【Issueタイトル】: ${{ github.event.issue.title }}
          【Issue内容】:
          ${{ github.event.issue.body }}
          " --yes

          git push origin $BRANCH_NAME
          gh pr create --title "[AI] ${{ github.event.issue.title }}" --body "Closes #${{ github.event.issue.number }}\n\nAIによって自動生成されたプルリクエストです。" --base main --head $BRANCH_NAME
