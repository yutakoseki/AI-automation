name: AI Generator

on:
  workflow_run:
    workflows: ["AI Planner"]
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download planner output
        uses: actions/download-artifact@v4
        with:
          name: ai-plan
          path: .ai
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate planner output
        run: |
          set -euo pipefail

          test -f .ai/plan.md
          test -f .ai/plan.json
          test -f .ai/target-files.txt

          jq empty .ai/plan.json

          target_count="$(jq '.target_files | length' .ai/plan.json)"
          if [ "$target_count" -eq 0 ]; then
            echo "Generator refused to run: target_files is empty"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install aider-chat

      - name: Run AI Coder (Aider)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.AI_PAT }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          ISSUE_NUMBER="$(jq -r '.issue_number' .ai/plan.json)"
          ISSUE_TITLE="$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')"

          # ブランチ名をIssue番号＋タイムスタンプで完全ユニーク化（PR作成失敗を100%防ぐ）
          BRANCH_NAME="ai-feature/issue-${ISSUE_NUMBER}-$(date +%s)"
          git checkout -b "$BRANCH_NAME"

          # Plannerが特定した対象ファイルと実装計画をAiderに渡す
          mapfile -t TARGET_FILES < <(sed '/^[[:space:]]*$/d' .ai/target-files.txt)
          aider "${TARGET_FILES[@]}" --message-file .ai/plan.md --yes --no-auto-commits

          if [ -z "$(git status --porcelain --untracked-files=all -- ':!.ai')" ]; then
            echo "Generator produced no changes"
            exit 1
          fi

          # 認証URLをあなたのPATで上書き（レビューAIを連鎖起動させるための鍵）
          git remote set-url origin "https://x-access-token:${{ secrets.AI_PAT }}@github.com/${{ github.repository }}.git"

          # 変更をステージング
          git add .

          git commit -m "feat: implemented by AI for Issue #${ISSUE_NUMBER}"

          # ブランチをプッシュ
          git push -f origin "$BRANCH_NAME"

          # PR作成（AI_PATをトークンとして使用し、人間が作ったように見せる）
          export GH_TOKEN="${{ secrets.AI_PAT }}"
          gh pr create --title "[AI] ${ISSUE_TITLE}" --body "
          ## 課題の概要
          Closes #${ISSUE_NUMBER}
          Issueに基づき、AIが自律開発を行いました。

          ## Planner output
          - .ai/plan.md
          - .ai/plan.json
          - .ai/target-files.txt

          ## 注意事項
          - AI生成コードです。PR Reviewerエージェントがこの後自動起動します。
          " --base main --head "$BRANCH_NAME"
