name: AI Planner

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  plan:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'ai-ready') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request == null && contains(github.event.issue.labels.*.name, 'ai-needs-info') && contains(github.event.comment.body, 'AI Planner needs clarification before it can safely create an implementation plan.') == false)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code Planner
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Read and follow `.github/ai-harness/planner.md`.

            GitHub Issue:
            Title: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            Latest clarification comment, if this run was triggered by an issue comment:
            ${{ github.event.comment.body }}
          claude_args: |
            --max-turns 20
            --allowedTools "Read,Glob,Grep,LS,Write,Edit"
            --disallowedTools "Bash,WebFetch,WebSearch"

      - name: Validate planner output
        id: validate
        run: |
          set -euo pipefail

          if [ -f .ai/needs-info.json ] && [ ! -f .ai/plan.json ]; then
            jq empty .ai/needs-info.json
            test "$(jq -r '.status' .ai/needs-info.json)" = "needs_info"
            test -n "$(jq -r '.question' .ai/needs-info.json)"
            echo "mode=needs_info" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f .ai/needs-info.json ] && [ -f .ai/plan.json ]; then
            echo "Planner produced both plan.json and needs-info.json"
            exit 1
          fi

          test -f .ai/plan.md
          test -f .ai/plan.json
          test -f .ai/target-files.txt

          jq empty .ai/plan.json
          jq '.issue_number = $issue_number' \
            --argjson issue_number "${{ github.event.issue.number }}" \
            .ai/plan.json > .ai/plan.tmp.json
          mv .ai/plan.tmp.json .ai/plan.json

          target_count="$(jq '.target_files | length' .ai/plan.json)"
          if [ "$target_count" -eq 0 ]; then
            echo "Planner failed: target_files is empty"
            exit 1
          fi

          required_test_count="$(jq '(.test_items.required // []) | length' .ai/plan.json)"
          if [ "$required_test_count" -eq 0 ]; then
            echo "Planner failed: test_items.required is empty"
            exit 1
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ ! -e "$file" ]; then
              echo "Warning: target file does not exist: $file"
            fi
          done < .ai/target-files.txt

          echo "mode=plan" >> "$GITHUB_OUTPUT"

      - name: Comment clarification request on issue
        if: steps.validate.outputs.mode == 'needs_info'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ github.event.issue.number }}"
          QUESTION="$(jq -r '.question' .ai/needs-info.json)"
          REASON="$(jq -r '.reason' .ai/needs-info.json)"
          OPTIONS="$(jq -r '.suggested_replies[]? | "- " + .' .ai/needs-info.json)"

          gh label create ai-needs-info \
            --color F9D0C4 \
            --description "AI planner is waiting for clarification" || true

          gh issue edit "$ISSUE_NUMBER" --add-label ai-needs-info

          gh issue comment "$ISSUE_NUMBER" --body "AI Planner needs clarification before it can safely create an implementation plan.

          Question:
          ${QUESTION}

          Reason:
          ${REASON}

          Suggested replies:
          ${OPTIONS}

          Reply to this issue with the needed clarification. The planner will run again automatically."

      - name: Stop until clarification is received
        if: steps.validate.outputs.mode == 'needs_info'
        run: |
          echo "Planner needs clarification. Generator will not run until a new issue comment retriggers planning."
          exit 1

      - name: Upload planner output
        if: steps.validate.outputs.mode == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: ai-plan
          path: .ai/
          include-hidden-files: true
          if-no-files-found: error

      - name: Clear clarification label
        if: steps.validate.outputs.mode == 'plan'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ github.event.issue.number }}"
          if gh issue view "$ISSUE_NUMBER" --json labels --jq '.labels[].name' | grep -Fxq ai-needs-info; then
            gh issue edit "$ISSUE_NUMBER" --remove-label ai-needs-info
          else
            echo "ai-needs-info label is not present; nothing to clear."
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p .ai

          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping Slack notification."
            exit 0
          fi

          STATUS="Planner失敗"
          DETAIL="AI Planner が停止しました。Actionsログを確認してください。"
          if [ -f .ai/needs-info.json ]; then
            STATUS="Planner停止 / 要確認"
            DETAIL="$(jq -r '.question // "追加確認が必要です。"' .ai/needs-info.json)"
          fi
          DETAIL="$(printf '%s' "$DETAIL" | tr '\n' ' ' | cut -c 1-500)"

          jq -n \
            --arg title "AI Planner が停止しました" \
            --arg status "$STATUS" \
            --arg issue "#${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --arg detail "$DETAIL" \
            --arg run_url "$RUN_URL" \
            '{
              text: $title,
              blocks: [
                { type: "header", text: { type: "plain_text", text: "AIパイプライン停止" } },
                {
                  type: "section",
                  fields: [
                    { type: "plain_text", text: ("フェーズ: Planner") },
                    { type: "plain_text", text: ("状態: " + $status) }
                  ]
                },
                { type: "section", text: { type: "plain_text", text: ("Issue: " + $issue) } },
                { type: "section", text: { type: "plain_text", text: ("理由: " + $detail) } },
                { type: "actions", elements: [ { type: "button", text: { type: "plain_text", text: "Actionsログを開く" }, url: $run_url } ] }
              ]
            }' > .ai/slack-failure-payload.json

          curl -sS -X POST \
            -H 'Content-Type: application/json' \
            --data @.ai/slack-failure-payload.json \
            "$SLACK_WEBHOOK_URL"
