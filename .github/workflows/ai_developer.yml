name: Auto AI Developer

on:
  issues:
    types: [opened] # 人間がIssueを開いた瞬間に自動起動

jobs:
  auto_development:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2026年現在、最も安定してIssueからPRを作れる自律型AIアクション
      - name: Run AI Coder
        uses: gpt-engineer-org/gpt-engineer-action@main
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }} # 登録済みのキー
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
