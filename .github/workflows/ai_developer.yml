name: AI Generator

on:
  workflow_run:
    workflows: ["AI Planner"]
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download planner output
        uses: actions/download-artifact@v4
        with:
          name: ai-plan
          path: .ai
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate planner output
        run: |
          set -euo pipefail

          test -f .ai/plan.md
          test -f .ai/plan.json
          test -f .ai/target-files.txt

          jq empty .ai/plan.json

          target_count="$(jq '.target_files | length' .ai/plan.json)"
          if [ "$target_count" -eq 0 ]; then
            echo "Generator refused to run: target_files is empty"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install aider-chat

      - name: Run AI Coder (Aider)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          ISSUE_NUMBER="$(jq -r '.issue_number // empty' .ai/plan.json)"
          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "0" ]; then
            echo "Invalid issue_number in .ai/plan.json"
            exit 1
          fi
          ISSUE_TITLE="$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')"

          # ブランチ名をIssue番号＋タイムスタンプで完全ユニーク化（PR作成失敗を100%防ぐ）
          BRANCH_NAME="ai-feature/issue-${ISSUE_NUMBER}-$(date +%s)"
          git checkout -b "$BRANCH_NAME"

          # Plannerが特定した対象ファイルと実装計画をAiderに渡す
          cat << 'EOF' >> .ai/plan.md

          ## Generator constraints
          - Implement the plan autonomously without asking for human clarification.
          - If the plan is broad or uncertain, implement the smallest safe slice described by the plan.
          - Do not perform unrelated refactors or large rewrites.
          - Prefer a useful, reviewable pull request over attempting to solve every out-of-scope item.
          - If a requested file is missing, create it only when the plan explicitly requires a new file; otherwise choose the closest existing file from the target list.
          - Do not run npm install, npm run build, npm run dev, or other shell commands. The evaluator will run verification commands after editing.
          EOF

          mapfile -t TARGET_FILES < <(sed '/^[[:space:]]*$/d' .ai/target-files.txt)
          aider "${TARGET_FILES[@]}" --message-file .ai/plan.md --yes --no-auto-commits

          if [ -z "$(git status --porcelain --untracked-files=all -- ':!.ai')" ]; then
            echo "Generator produced no changes"
            exit 1
          fi

          # Evaluator: PR作成前に機械的な検証を行う
          EVALUATION_STATUS="approved"
          EVALUATION_REASON="Implementation produced a diff and npm run build passed."
          {
            echo "# AI Evaluation"
            echo
            echo "## Checks"
            echo "- Generated diff exists: passed"
          } > .ai/evaluation.md

          if [ -f package-lock.json ]; then
            echo "- npm ci: running before build" >> .ai/evaluation.md
            if npm ci; then
              echo "- npm ci: passed" >> .ai/evaluation.md
            else
              EVALUATION_STATUS="rejected"
              EVALUATION_REASON="npm ci failed before build."
              echo "- npm ci: failed" >> .ai/evaluation.md
            fi
          else
            echo "- npm install: running before build" >> .ai/evaluation.md
            if npm install; then
              echo "- npm install: passed" >> .ai/evaluation.md
            else
              EVALUATION_STATUS="rejected"
              EVALUATION_REASON="npm install failed before build."
              echo "- npm install: failed" >> .ai/evaluation.md
            fi
          fi

          if [ "$EVALUATION_STATUS" = "approved" ] && npm run build > .ai/build.log 2>&1; then
            echo "- npm run build: passed" >> .ai/evaluation.md
          elif [ "$EVALUATION_STATUS" != "approved" ]; then
            echo "- npm run build: skipped because an earlier evaluator check failed" >> .ai/evaluation.md
          else
            echo "- npm run build: failed; starting automatic repair attempts" >> .ai/evaluation.md

            EVALUATION_STATUS="rejected"
            EVALUATION_REASON="npm run build failed after automatic repair attempts."

            for attempt in 1 2; do
              sed -E '/https?:\/\//d; /Next.js now collects completely anonymous telemetry/d; /No build cache found/d' .ai/build.log > .ai/build-sanitized.log

              {
                echo "# Repair request"
                echo
                echo "The implementation generated from .ai/plan.md failed npm run build."
                echo "Fix only the build/type errors below. Do not add unrelated features or refactors."
                echo "Do not browse the web. Do not run shell commands. Only edit files."
                echo
                echo "## Build log"
                echo '```'
                sed -n '1,220p' .ai/build-sanitized.log
                echo '```'
              } > .ai/repair.md

              mapfile -t REPAIR_FILES < <(git diff --name-only -- ':!.ai' | grep -E '\.(ts|tsx|js|jsx|css|json|config\.js)$' || true)
              if [ "${#REPAIR_FILES[@]}" -eq 0 ]; then
                mapfile -t REPAIR_FILES < <(sed '/^[[:space:]]*$/d' .ai/target-files.txt)
              fi

              aider "${REPAIR_FILES[@]}" --message-file .ai/repair.md --yes --no-auto-commits

              if npm run build > .ai/build.log 2>&1; then
                echo "- automatic repair attempt ${attempt}: passed" >> .ai/evaluation.md
                EVALUATION_STATUS="approved"
                EVALUATION_REASON="Implementation produced a diff and npm run build passed after automatic repair."
                break
              fi

              echo "- automatic repair attempt ${attempt}: failed" >> .ai/evaluation.md
            done

            if [ "$EVALUATION_STATUS" != "approved" ]; then
              echo >> .ai/evaluation.md
              echo "## Build log" >> .ai/evaluation.md
              echo '```' >> .ai/evaluation.md
              sed -n '1,240p' .ai/build.log >> .ai/evaluation.md
              echo '```' >> .ai/evaluation.md
            fi
          fi

          jq -n \
            --argjson approved "$([ "$EVALUATION_STATUS" = "approved" ] && echo true || echo false)" \
            --arg reason "$EVALUATION_REASON" \
            --arg generated_diff "$(git diff --name-only -- ':!.ai' | tr '\n' ' ')" \
            '{
              approved: $approved,
              reason: $reason,
              changed_files: ($generated_diff | split(" ") | map(select(length > 0))),
              blocking_issues: (if $approved then [] else [$reason] end)
            }' > .ai/verdict.json

          if [ "$EVALUATION_STATUS" != "approved" ]; then
            gh issue comment "$ISSUE_NUMBER" --body-file .ai/evaluation.md
            echo "$EVALUATION_REASON"
            exit 1
          fi

          # GITHUB_TOKENでブランチをpushする
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # 変更をステージング
          git add .

          git commit -m "feat: implemented by AI for Issue #${ISSUE_NUMBER}"

          # ブランチをプッシュ
          git push -f origin "$BRANCH_NAME"

          # PR作成
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          gh pr create --title "[AI] ${ISSUE_TITLE}" --body "
          ## 課題の概要
          Closes #${ISSUE_NUMBER}
          Issueに基づき、AIが自律開発を行いました。

          ## Planner output
          - .ai/plan.md
          - .ai/plan.json
          - .ai/target-files.txt

          ## Evaluator output
          - .ai/evaluation.md
          - .ai/verdict.json

          ## 注意事項
          - AI生成コードです。Evaluator を通過した場合のみPR化されています。
          " --base main --head "$BRANCH_NAME"
