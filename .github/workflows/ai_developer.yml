name: AI Issue Worker

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    # 'ai-ready'ラベルが貼られたときのみ実行
    if: github.event.label.name == 'ai-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install aider-chat

      - name: Run AI Coder (Aider)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.AI_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="ai-feature/issue-${{ github.event.issue.number }}"
          git checkout -b $BRANCH_NAME

          # Issueの内容をファイルに書き出し、Aiderに渡す（文字化け・改行エラー対策）
          cat << 'EOF' > issue_prompt.txt
          Issueタイトル: ${{ github.event.issue.title }}
          Issue詳細:
          ${{ github.event.issue.body }}
          EOF

          aider --message-file issue_prompt.txt --yes --no-auto-commits

          # 認証URLをあなたのPATで上書き（PR連鎖起動の鍵）
          git remote set-url origin "https://x-access-token:${{ secrets.AI_PAT }}@github.com/${{ github.repository }}.git"

          # 変更をステージング
          git add .

          # 差分があるか確認
          if [ -n "$(git status --porcelain)" ] || [ -n "$(git diff origin/main HEAD)" ]; then
            
            # コミット実行
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "feat: implemented by AI for Issue #${{ github.event.issue.number }}"
            fi
            
            # 強制プッシュ
            git push -f origin $BRANCH_NAME
            
            # PR作成（AI_PATをトークンとして使用）
            export GH_TOKEN="${{ secrets.AI_PAT }}"
            gh pr create --title "[AI] ${{ github.event.issue.title }}" --body "
            ## 🎯 課題の概要
            Closes #${{ github.event.issue.number }}
            Issueに基づき、AIが自律開発を行いました。
            
            ## ⚠️ レビュアーへの確認点
            - AI生成コードです。ロジックの意図が正しいか確認してください。
            " --base main --head $BRANCH_NAME || echo "PR already exists."
          else
            echo "差分なし。処理を終了します。"
            exit 0
          fi
