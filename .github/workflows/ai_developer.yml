name: Auto AI Developer

on:
  issues:
    types: [opened]

jobs:
  auto_development:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 完全にオープンソースで、現在も確実にメンテされているIssue解決エージェント
      - name: Run AI Coder
        uses: mtfoley/pr-agent-action@main
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Issueを読み込んでPRを自動作成するコマンドを指示
          PR_AGENT_CUSTOM_COMMAND: "/improve"
