name: AI Issue Worker

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    if: github.event.label.name == 'ai-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install aider-chat

      - name: Run AI Coder (Aider)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.AI_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="ai-feature/issue-${{ github.event.issue.number }}"
          git checkout -b $BRANCH_NAME

          # Issueのタイトルと本文を一度環境変数に安全に退避させ、Aiderの引数誤認バグを防ぎます
          export ISSUE_TITLE="${{ github.event.issue.title }}"
          export ISSUE_BODY="${{ github.event.issue.body }}"

          # 【修正箇所】--message の中身を極力シンプルにし、環境変数経由でタスクを安全に注入
          aider --message "修正タスクを開始してください。Issueタイトル: $ISSUE_TITLE / 要望詳細: $ISSUE_BODY" --yes --no-auto-commits

          # 認証URLの設定
          git remote set-url origin "https://x-access-token:${{ secrets.AI_PAT }}@github.com/${{ github.repository }}.git"

          # 未コミットの変更があればすべてステージング
          git add .

          # mainブランチとの間にコードの差分があるかをチェック
          if [ -n "$(git status --porcelain)" ] || [ -n "$(git diff origin/main HEAD)" ]; then
            
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "feat: implemented by AI for Issue #${{ github.event.issue.number }}"
            fi
            
            git push -f origin $BRANCH_NAME
            
            AI_SUMMARY=$(git log -1 --pretty=%B)
            
            # プルリクエストを作成
            export GH_TOKEN="${{ secrets.AI_PAT }}"
            gh pr create --title "[AI] ${{ github.event.issue.title }}" --body "
            ## 🎯 課題の概要
            Closes #${{ github.event.issue.number }}
            Issue 「${{ github.event.issue.title }}」の要望に基づき、AIが自律開発を行いました。
            
            ## 🛠️ 今回の具体的な修正点
            $AI_SUMMARY
            
            ## ⚠️ レビュアー（人間）への注意点・確認方法
            - AIが自動生成したコードです。意図通りのロジックやデザインになっているか、画面上の「Files changed」タブで最終確認をお願いします。
            " --base main --head $BRANCH_NAME || echo "PR is already created or updated."
          else
            echo "リポジトリ内に差分が全く検出されなかったため、PR作成をスキップします。"
            exit 0
          fi
