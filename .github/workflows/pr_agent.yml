name: AI Reviewer

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_run:
    workflows: ["AI Generator"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: github.event_name == 'pull_request' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download PR metadata
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: ai-pr
          path: .ai
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve pull request context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "title<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ github.event.pull_request.body }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f .ai/pr.json ]; then
            PR_NUMBER="$(jq -r '.number' .ai/pr.json)"
            HEAD_BRANCH="$(jq -r '.branch' .ai/pr.json)"
            PR_JSON="$(gh pr view "$PR_NUMBER" --json number,title,body,baseRefName,headRefName)"
          else
            HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
            PR_JSON="$(gh pr list --head "$HEAD_BRANCH" --state open --json number,title,body,baseRefName,headRefName --jq '.[0]')"
          fi
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "No open pull request found for this reviewer run."
            exit 1
          fi

          echo "number=$(jq -r '.number' <<< "$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.title' <<< "$PR_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.body // ""' <<< "$PR_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "base=$(jq -r '.baseRefName' <<< "$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "head=$(jq -r '.headRefName' <<< "$PR_JSON")" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$(jq -r '.headRefName' <<< "$PR_JSON")" >> "$GITHUB_OUTPUT"

      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.checkout_ref }}

      - name: Run Claude Code Reviewer
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are the Reviewer agent for an autonomous development pipeline.

            Your task:
            - Review this pull request for merge readiness in Japanese.
            - Reduce the final human reviewer's workload by giving a short, decision-oriented review.
            - Do not modify application source code.
            - Do not create commits.
            - Do not approve or merge the pull request.
            - Only create or update .ai/review.md.

            Review inputs:
            - Pull request number: ${{ steps.pr.outputs.number }}
            - Pull request title: ${{ steps.pr.outputs.title }}
            - Pull request body: ${{ steps.pr.outputs.body }}
            - Base branch: ${{ steps.pr.outputs.base }}
            - Head branch: ${{ steps.pr.outputs.head }}
            - If present, read .ai/plan.md, .ai/plan.json, .ai/evaluation.md, and .ai/verdict.json.
            - Inspect the changed files and compare them with the plan and evaluator output.

            Review criteria:
            - Does the diff implement the plan?
            - Did the evaluator pass?
            - Are there build, type, dependency, or lockfile risks?
            - Are there obvious regressions in existing behavior?
            - Are there unrelated or excessive changes?
            - Are there accessibility, UX, or maintainability concerns worth a human checking?

            Create .ai/review.md in Japanese with exactly this structure:

            # AIレビュー

            ## 判定
            One line only:
            - 🟢 マージOK
            - 🟡 要確認
            - 🔴 マージNG

            ## スコア
            One line only. Use a number from 0 to 100.
            Example: 82 / 100

            ## 理由
            1-3 bullets only. Explain why this verdict was chosen.

            ## 人間が見るべき点
            1-3 bullets only. Include only items that affect merge judgment.

            ## 検証結果
            1-3 bullets only. Mention evaluator/build result if available.

            ## ブロッカー
            Use "なし" if no blocking issue is found.

            ## 軽微な懸念
            Use "なし" if no concern is found.

            Rules:
            - Output Japanese only.
            - Keep the entire review under 35 lines.
            - Put the merge decision first.
            - Be concrete and cite file paths only when needed.
            - Do not invent test results.
            - If evaluator output is missing, use 🟡 要確認 or 🔴 マージNG.
            - If build/evaluator failed or verdict.json approved is false, verdict must be 🔴 マージNG and score must be below 50.
            - If the only issues are minor visual or UX concerns, use 🟡 要確認.
            - Use 🟢 マージOK only when there are no blocking issues and no important human judgment items.
            - Keep the review concise.
          claude_args: |
            --max-turns 12
            --allowedTools "Read,Glob,Grep,LS,Write"
            --disallowedTools "Bash,WebFetch,WebSearch,Edit"

      - name: Validate review output
        run: |
          set -euo pipefail
          test -f .ai/review.md
          grep -q '^# AIレビュー' .ai/review.md
          grep -q '^## 判定' .ai/review.md
          grep -q '^## 人間が見るべき点' .ai/review.md

      - name: Comment review on pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr comment "${{ steps.pr.outputs.number }}" --body-file .ai/review.md

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_URL: https://github.com/${{ github.repository }}/pull/${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          mkdir -p .ai

          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping Slack notification."
            exit 0
          fi

          VERDICT="$(awk '/^## 判定/{getline; while ($0 == "") getline; print; exit}' .ai/review.md)"
          SCORE="$(awk '/^## スコア/{getline; while ($0 == "") getline; print; exit}' .ai/review.md)"
          CONCERNS="$(awk '/^## 人間が見るべき点/{flag=1; next} /^## /{flag=0} flag {print}' .ai/review.md | sed '/^[[:space:]]*$/d' | head -n 3)"

          if printf '%s' "$VERDICT" | grep -q '🟢'; then
            STATUS="PR成功 / マージOK"
          elif printf '%s' "$VERDICT" | grep -q '🔴'; then
            STATUS="PR成功 / マージNG"
          else
            STATUS="PR成功 / 要確認"
          fi
          CONCERNS="$(printf '%s' "$CONCERNS" | tr '\n' ' ' | cut -c 1-500)"

          jq -n \
            --arg title "AIレビュー完了: PR #${PR_NUMBER}" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_url "$PR_URL" \
            --arg status "$STATUS" \
            --arg verdict "${VERDICT:-要確認}" \
            --arg score "${SCORE:-未採点}" \
            --arg concerns "${CONCERNS:-大きな懸念なし}" \
            '{
              text: $title,
              blocks: [
                { type: "header", text: { type: "plain_text", text: "AIレビュー完了" } },
                { type: "section", text: { type: "plain_text", text: ("PR #" + $pr_number + ": " + $pr_title) } },
                {
                  type: "section",
                  fields: [
                    { type: "plain_text", text: ("状態: " + $status) },
                    { type: "plain_text", text: ("判定: " + $verdict) },
                    { type: "plain_text", text: ("スコア: " + $score) }
                  ]
                },
                { type: "section", text: { type: "plain_text", text: ("懸念点: " + $concerns) } },
                { type: "actions", elements: [ { type: "button", text: { type: "plain_text", text: "PRを開く" }, url: $pr_url } ] }
              ]
            }' > .ai/slack-payload.json

          curl -sS -X POST \
            -H 'Content-Type: application/json' \
            --data @.ai/slack-payload.json \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p .ai

          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping Slack notification."
            exit 0
          fi

          PR_LABEL="PR #${PR_NUMBER:-unknown}: ${PR_TITLE:-unknown}"
          jq -n \
            --arg title "AI Reviewer が停止しました" \
            --arg pr "$PR_LABEL" \
            --arg run_url "$RUN_URL" \
            '{
              text: $title,
              blocks: [
                { type: "header", text: { type: "plain_text", text: "AIパイプライン停止" } },
                {
                  type: "section",
                  fields: [
                    { type: "plain_text", text: "フェーズ: Reviewer" },
                    { type: "plain_text", text: "状態: 失敗" }
                  ]
                },
                { type: "section", text: { type: "plain_text", text: ("対象: " + $pr) } },
                { type: "section", text: { type: "plain_text", text: "理由: Reviewerの実行または通知に失敗しました。" } },
                { type: "actions", elements: [ { type: "button", text: { type: "plain_text", text: "Actionsログを開く" }, url: $run_url } ] }
              ]
            }' > .ai/slack-failure-payload.json

          curl -sS -X POST \
            -H 'Content-Type: application/json' \
            --data @.ai/slack-failure-payload.json \
            "$SLACK_WEBHOOK_URL"
