name: AI Planner

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  plan:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'ai-ready') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request == null && contains(github.event.issue.labels.*.name, 'ai-needs-info') && contains(github.event.comment.body, 'AI Planner needs clarification before it can safely create an implementation plan.') == false)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code Planner
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are the Planner agent for an autonomous development pipeline.

            Your task:
            - Read the GitHub Issue.
            - Explore this repository.
            - Identify the files that most likely need changes.
            - Produce an implementation plan for a separate coding agent.

            Execution budget:
            - Finish in at most 6 tool calls.
            - First inspect only the repository root, package.json, pages/, components/, styles/, and existing Tailwind/PostCSS config files if present.
            - Do not inspect lockfiles, node_modules, .next, build output, or generated files.
            - Do not attempt exhaustive design analysis.
            - Write the required .ai files as soon as you have enough context for a safe first pull request.

            Planning style:
            - Do not over-analyze. You have a hard limit of 20 turns, but should finish much earlier.
            - You must create the required .ai files within the turn limit.
            - Do not wait for human clarification. This pipeline must proceed autonomously.
            - If the issue is broad or ambiguous, choose the smallest safe implementation slice that can produce a useful pull request.
            - If full completion is risky, put the remaining work in out_of_scope and plan only the first concrete step.
            - Prefer conservative, reversible changes over large rewrites.
            - Do not browse the web. Focus only on the local repository.
            - If you are unsure about specific files, list the best likely files and explain the risk.
            - Ask for clarification only when implementation would be dangerous or impossible without it.

            Important restrictions:
            - Do not modify application source code.
            - Do not fix the issue.
            - Do not create commits.
            - Do not create a pull request.
            - Only create or update files under .ai/.

            Create these files:

            1. .ai/plan.md
            Human-readable implementation plan.

            2. .ai/plan.json
            Machine-readable implementation plan.

            3. .ai/target-files.txt
            One file path per line.

            If and only if the issue cannot be implemented safely without clarification, do not create plan files.
            Instead, create:

            .ai/needs-info.json

            needs-info.json schema:

            {
              "issue_number": number,
              "status": "needs_info",
              "question": "string",
              "reason": "string",
              "suggested_replies": [
                "string"
              ]
            }

            The question must be specific and answerable in one issue comment.
            suggested_replies must contain 2 to 4 concrete options whenever possible.

            plan.json schema:

            {
              "issue_number": number,
              "summary": "string",
              "confidence": "high | medium | low",
              "target_files": [
                "path/to/file"
              ],
              "required_changes": [
                {
                  "file": "path/to/file",
                  "change": "string",
                  "reason": "string",
                  "acceptance_criteria": [
                    "string"
                  ]
                }
              ],
              "commands_to_run": [
                "string"
              ],
              "out_of_scope": [
                "string"
              ],
              "risks": [
                "string"
              ],
              "open_questions": [
                "string"
              ]
            }

            Rules:
            - target_files must not be empty unless there is no plausible repository file to change.
            - If confidence is low, still provide the best candidate files.
            - Prefer concrete file paths over general advice.
            - Do not say "no changes needed" unless you can prove it from the repository.
            - Do not ask questions or require user confirmation for ordinary ambiguity.
            - If clarification is truly required, create only .ai/needs-info.json.
            - open_questions is only for documenting uncertainty; it must not block autonomous implementation.
            - Do not include Markdown fences in plan.json.
            - plan.json and needs-info.json must be valid JSON.

            GitHub Issue:
            Title: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            Latest clarification comment, if this run was triggered by an issue comment:
            ${{ github.event.comment.body }}
          claude_args: |
            --max-turns 20
            --allowedTools "Read,Glob,Grep,LS,Write,Edit"
            --disallowedTools "Bash,WebFetch,WebSearch"

      - name: Validate planner output
        id: validate
        run: |
          set -euo pipefail

          if [ -f .ai/needs-info.json ] && [ ! -f .ai/plan.json ]; then
            jq empty .ai/needs-info.json
            test "$(jq -r '.status' .ai/needs-info.json)" = "needs_info"
            test -n "$(jq -r '.question' .ai/needs-info.json)"
            echo "mode=needs_info" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f .ai/needs-info.json ] && [ -f .ai/plan.json ]; then
            echo "Planner produced both plan.json and needs-info.json"
            exit 1
          fi

          test -f .ai/plan.md
          test -f .ai/plan.json
          test -f .ai/target-files.txt

          jq empty .ai/plan.json

          target_count="$(jq '.target_files | length' .ai/plan.json)"
          if [ "$target_count" -eq 0 ]; then
            echo "Planner failed: target_files is empty"
            exit 1
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ ! -e "$file" ]; then
              echo "Warning: target file does not exist: $file"
            fi
          done < .ai/target-files.txt

          echo "mode=plan" >> "$GITHUB_OUTPUT"

      - name: Comment clarification request on issue
        if: steps.validate.outputs.mode == 'needs_info'
        env:
          GH_TOKEN: ${{ secrets.AI_PAT }}
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ github.event.issue.number }}"
          QUESTION="$(jq -r '.question' .ai/needs-info.json)"
          REASON="$(jq -r '.reason' .ai/needs-info.json)"
          OPTIONS="$(jq -r '.suggested_replies[]? | "- " + .' .ai/needs-info.json)"

          gh label create ai-needs-info \
            --color F9D0C4 \
            --description "AI planner is waiting for clarification" || true

          gh issue edit "$ISSUE_NUMBER" --add-label ai-needs-info

          gh issue comment "$ISSUE_NUMBER" --body "AI Planner needs clarification before it can safely create an implementation plan.

          Question:
          ${QUESTION}

          Reason:
          ${REASON}

          Suggested replies:
          ${OPTIONS}

          Reply to this issue with the needed clarification. The planner will run again automatically."

      - name: Stop until clarification is received
        if: steps.validate.outputs.mode == 'needs_info'
        run: |
          echo "Planner needs clarification. Generator will not run until a new issue comment retriggers planning."
          exit 1

      - name: Upload planner output
        if: steps.validate.outputs.mode == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: ai-plan
          path: .ai/
          include-hidden-files: true
          if-no-files-found: error

      - name: Comment plan on issue
        if: steps.validate.outputs.mode == 'plan'
        env:
          GH_TOKEN: ${{ secrets.AI_PAT }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          gh issue edit "$ISSUE_NUMBER" --remove-label ai-needs-info || true
          gh issue comment "$ISSUE_NUMBER" \
            --body-file .ai/plan.md
