name: AI Issue Worker

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    if: github.event.label.name == 'ai-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install aider-chat

      - name: Run AI Coder (Aider)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIDER_DARK_MODE: "true" # ログを見やすく
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="ai-feature/issue-${{ github.event.issue.number }}"
          git checkout -b $BRANCH_NAME

          # プロンプトの先頭に、ファイルを直接作成させる強い指示を与えます
          # また、コミットメッセージもAIに自動生成させます
          aider --message "
          [CRITICAL: NON-INTERACTIVE CI ENVIRONMENT]
          Do not ask any questions or confirmations. Just create and modify the files immediately.

          Task: Implement the following GitHub Issue.
          Title: ${{ github.event.issue.title }}
          Body:
          ${{ github.event.issue.body }}
          " --yes --commit

          # Aiderが万が一自動コミットし忘れた場合のセーフティネット
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "feat: auto-implemented by AI for Issue #${{ github.event.issue.number }}"
          fi

          # ブランチをプッシュしてPRを作成
          git push origin $BRANCH_NAME
          gh pr create --title "[AI] ${{ github.event.issue.title }}" --body "Closes #${{ github.event.issue.number }}\n\nAIによって自動生成されたプルリクエストです。" --base main --head $BRANCH_NAME
