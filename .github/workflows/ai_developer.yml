name: AI Issue Worker

on:
  # 人間がIssueに何かしらの「ラベル」をペタッと貼った瞬間にActionsを起動
  issues:
    types: [labeled]

permissions:
  contents: write # AIがソースコードを変更したり、新しいブランチを作ったりする権限
  pull-requests: write # AIが自動でプルリクエスト（PR）を作成して人間に届ける権限
  issues: write # 必要に応じてIssueにコメントを書き込む権限

jobs:
  implement:
    # 貼られたラベルの名前が「ai-ready」である時だけ、この先のAI処理を実行する（それ以外は即座にスキップ）
    if: github.event.label.name == 'ai-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 20 # 念のためのAI暴走・コスト爆発防止（20分で強制終了）

    steps:
      # 1. サーバー環境にリポジトリの全ソースコードをチェックアウト（ダウンロード）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. AIツール「Aider」を動かすためのPython環境（3.11）をセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 世界最高峰の自律型コーディングAIエージェント「Aider」をインストール
      - name: Install Aider
        run: pip install aider-chat

      # 4. OpenAIのAPIキーを使って、AIにIssueを丸投げし自動開発を実行
      - name: Run AI Coder (Aider)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }} # 登録済みのOpenAIのAPIキー
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHubが自動発行する安全なトークン
        run: |
          # Gitのコミットログに記録されるユーザー名とメールアドレスを設定（GitHub公式のボットアカウントを指定）
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 今回のIssue番号を組み込んだ、AI専用の開発用ブランチ名を定義して作成・切り替え
          BRANCH_NAME="ai-feature/issue-${{ github.event.issue.number }}"
          git checkout -b $BRANCH_NAME

          # 【最強の自動実装コマンド】
          # OUTPUT REQUIREMENTSにて、プルリク用の変更サマリー（解説）を出力させる指示を追加しています
          aider --message "
          [SYSTEM INSTRUCTION: AUTONOMOUS MODE]
          - You are an expert developer agent.
          - Create all necessary directories, files, and boilerplate code from scratch if they don't exist.
          - DO NOT ASK FOR CONFIRMATION.
          - Use best practices for the technology requested in the issue.

          [TASK]
          Issue Title: ${{ github.event.issue.title }}
          Issue Body:
          ${{ github.event.issue.body }}

          [OUTPUT REQUIREMENTS]
          - Create or modify the required files immediately.
          - At the very end of your work, write a clear summary of your changes (what you fixed, why, and what to watch out for).
          " --yes --no-auto-commits

          # AIの処理が終わり、リポジトリ内に「新しく作られたファイル」や「変更された差分」があるかチェック
          if [ -n "$(git status --porcelain)" ]; then
            # 変更があった場合：すべてのファイルをステージングエリアに追加
            git add .
            
            # 変更履歴をコミットメッセージとして保存
            git commit -m "feat: implemented by AI for Issue #${{ github.event.issue.number }}"
            
            # 過去の古い同名ブランチが残っていても、上書きで強制プッシュ（-f）する
            git push -f origin $BRANCH_NAME
            
            # AI（Aider）が最後に出力した詳細ログやGitの変更サマリーを自動抽出
            AI_SUMMARY=$(git log -1 --pretty=%B)
            
            # GitHub CLI（ghコマンド）を使って自動でプルリクエストを作成
            # 機械的な一言をやめ、「概要」「具体的な修正点」「注意点」を綺麗に構造化して流し込みます
            gh pr create --title "[AI] ${{ github.event.issue.title }}" --body "
            ## 🎯 課題の概要
            Closes #${{ github.event.issue.number }}
            Issue 「${{ github.event.issue.title }}」の要望に基づき、AIが自律開発を行いました。
            
            ## 🛠️ 今回の具体的な修正点
            $AI_SUMMARY
            
            ## ⚠️ レビュアー（人間）への注意点・確認方法
            - AIが自動生成したコードです。意図通りのロジックやデザインになっているか、画面上の「Files changed」タブで最終確認をお願いします。
            - 不要な設定ファイルの書き換えや、パッケージの依存関係に変更が入っていないか念のためご確認ください。
            " --base main --head $BRANCH_NAME || echo "PR is already created or updated."
          else
            # 変更が一切なかった場合：AIが何もファイルを作れずに失敗したとみなし、エラーログを出してActionsを異常終了させる
            echo "No changes detected. AI might have failed to implement."
            exit 1
          fi
