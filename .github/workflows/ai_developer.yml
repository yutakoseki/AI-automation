name: AI Generator

on:
  workflow_run:
    workflows: ["AI Planner"]
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download planner output
        uses: actions/download-artifact@v4
        with:
          name: ai-plan
          path: .ai
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate planner output
        run: |
          set -euo pipefail

          test -f .ai/plan.md
          test -f .ai/plan.json
          test -f .ai/target-files.txt

          jq empty .ai/plan.json

          target_count="$(jq '.target_files | length' .ai/plan.json)"
          if [ "$target_count" -eq 0 ]; then
            echo "Generator refused to run: target_files is empty"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install aider-chat

      - name: Run AI Coder (Aider)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_PAT: ${{ secrets.AI_PAT }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          ISSUE_NUMBER="$(jq -r '.issue_number // empty' .ai/plan.json)"
          if [ -z "$ISSUE_NUMBER" ] || [ "$ISSUE_NUMBER" = "0" ]; then
            echo "Invalid issue_number in .ai/plan.json"
            exit 1
          fi
          ISSUE_TITLE="$(gh issue view "$ISSUE_NUMBER" --json title --jq '.title')"

          # ブランチ名をIssue番号＋タイムスタンプで完全ユニーク化（PR作成失敗を100%防ぐ）
          BRANCH_NAME="ai-feature/issue-${ISSUE_NUMBER}-$(date +%s)"
          git checkout -b "$BRANCH_NAME"

          # Plannerが特定した対象ファイルと実装計画をAiderに渡す
          cat << 'EOF' >> .ai/plan.md

          ## Generator constraints
          - Implement the plan autonomously without asking for human clarification.
          - If the plan is broad or uncertain, implement the smallest safe slice described by the plan.
          - Do not perform unrelated refactors or large rewrites.
          - Prefer a useful, reviewable pull request over attempting to solve every out-of-scope item.
          - If a requested file is missing, create it only when the plan explicitly requires a new file; otherwise choose the closest existing file from the target list.
          - Do not run npm install, npm run build, npm run dev, or other shell commands. The evaluator will run verification commands after editing.
          EOF

          mapfile -t TARGET_FILES < <(sed '/^[[:space:]]*$/d' .ai/target-files.txt)
          aider "${TARGET_FILES[@]}" --message-file .ai/plan.md --yes --no-auto-commits

          if [ -z "$(git status --porcelain --untracked-files=all -- ':!.ai')" ]; then
            echo "Generator produced no changes"
            exit 1
          fi

          # Generator self-check: build/type errors are sent back to Aider before evaluation.
          REPAIR_ATTEMPTS=0
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          if ! npm run build > .ai/build.log 2>&1; then
            for attempt in 1 2 3 4; do
              REPAIR_ATTEMPTS="$attempt"
              sed -E '/https?:\/\//d; /Next.js now collects completely anonymous telemetry/d; /No build cache found/d; /npm fund/d; /npm audit/d; /vulnerabilities/d' .ai/build.log > .ai/build-sanitized.log
              if grep -q 'Failed to compile' .ai/build-sanitized.log; then
                sed -n '/Failed to compile/,$p' .ai/build-sanitized.log > .ai/build-focused.log
              else
                cp .ai/build-sanitized.log .ai/build-focused.log
              fi

              {
                echo "# Repair request"
                echo
                echo "The implementation generated from .ai/plan.md failed npm run build."
                echo "This is repair attempt ${attempt} of 4."
                echo "Fix only the build/type errors below. Do not add unrelated features, refactors, validation behavior changes, or styling changes."
                echo "Preserve existing runtime behavior unless the build error requires a minimal type-safe adjustment."
                echo "Do not browse the web. Do not run shell commands. Only edit files."
                echo
                echo "## Build log"
                echo '```'
                sed -n '1,220p' .ai/build-focused.log
                echo '```'
              } > .ai/repair.md

              mapfile -t REPAIR_FILES < <(git diff --name-only -- ':!.ai' | grep -E '\.(ts|tsx|js|jsx|css|json|config\.js)$' || true)
              if [ "${#REPAIR_FILES[@]}" -eq 0 ]; then
                mapfile -t REPAIR_FILES < <(sed '/^[[:space:]]*$/d' .ai/target-files.txt)
              fi

              aider "${REPAIR_FILES[@]}" --message-file .ai/repair.md --yes --no-auto-commits

              if npm run build > .ai/build.log 2>&1; then
                break
              fi
            done
          fi

          if ! npm run build > .ai/build.log 2>&1; then
            EVALUATION_STATUS="rejected"
            EVALUATION_REASON="Generator could not produce buildable code after automatic repair attempts."
            {
              echo "# AI Evaluation"
              echo
              echo "## Checks"
              echo "- Generator self-check: failed"
              echo "- Automatic repair attempts: ${REPAIR_ATTEMPTS}"
              echo
              echo "## Build log"
              echo '```'
              sed -n '1,240p' .ai/build.log
              echo '```'
            } > .ai/evaluation.md

            jq -n \
              --arg reason "$EVALUATION_REASON" \
              --argjson repair_attempts "$REPAIR_ATTEMPTS" \
              '{
                approved: false,
                reason: $reason,
                metrics: { repair_attempts: $repair_attempts },
                checks: {
                  generator_self_check: false,
                  build_passed: false
                },
                blocking_issues: [$reason]
              }' > .ai/verdict.json

            gh issue comment "$ISSUE_NUMBER" --body-file .ai/evaluation.md
            echo "$EVALUATION_REASON"
            exit 1
          fi

          evaluate_current_diff() {
            EVALUATION_STATUS="approved"
            EVALUATION_REASON="Generator produced buildable code and evaluator checks passed."
            CHANGED_FILES="$(git diff --name-only -- ':!.ai' | sort)"
            TARGET_FILES="$(sed '/^[[:space:]]*$/d' .ai/target-files.txt | sort)"
            MATCHED_TARGET_FILES="$(comm -12 <(printf '%s\n' "$CHANGED_FILES") <(printf '%s\n' "$TARGET_FILES") || true)"
            UNPLANNED_FILES="$(comm -23 <(printf '%s\n' "$CHANGED_FILES") <(printf '%s\n' "$TARGET_FILES") || true)"
            TARGET_MATCH_COUNT="$(printf '%s\n' "$MATCHED_TARGET_FILES" | sed '/^$/d' | wc -l | tr -d ' ')"
            CHANGED_FILE_COUNT="$(printf '%s\n' "$CHANGED_FILES" | sed '/^$/d' | wc -l | tr -d ' ')"
            UNPLANNED_FILE_COUNT="$(printf '%s\n' "$UNPLANNED_FILES" | sed '/^$/d' | wc -l | tr -d ' ')"

            {
              echo "# AI Evaluation"
              echo
              echo "## Verdict Inputs"
              echo "- Evaluation round: ${EVALUATION_ROUND}"
              echo "- Plan summary: $(jq -r '.summary // "N/A"' .ai/plan.json)"
              echo "- Planner confidence: $(jq -r '.confidence // "unknown"' .ai/plan.json)"
              echo "- Final changed files: ${CHANGED_FILE_COUNT}"
              echo "- Final changed target files: ${TARGET_MATCH_COUNT}"
              echo "- Final unplanned changed files: ${UNPLANNED_FILE_COUNT}"
              echo "- Generator automatic repair attempts: ${REPAIR_ATTEMPTS}"
              echo "- Evaluator requested fixes: ${EVALUATOR_FIX_ATTEMPTS}"
              echo
              echo "## Changed Files"
              if [ -n "$CHANGED_FILES" ]; then
                printf '%s\n' "$CHANGED_FILES" | sed 's/^/- /'
              else
                echo "- none"
              fi
              echo
              echo "## Unplanned Changed Files"
              if [ -n "$UNPLANNED_FILES" ]; then
                printf '%s\n' "$UNPLANNED_FILES" | sed 's/^/- /'
              else
                echo "- none"
              fi
              echo
              echo "## Checks"
              echo "- Generated diff exists: passed"
              echo "- Generator self-check build: passed"
            } > .ai/evaluation.md

            if [ "$TARGET_MATCH_COUNT" -eq 0 ]; then
              EVALUATION_STATUS="rejected"
              EVALUATION_REASON="Generated diff did not modify any planner target files."
              echo "- Target file coverage: failed" >> .ai/evaluation.md
            else
              echo "- Target file coverage: passed" >> .ai/evaluation.md
            fi

            if printf '%s\n' "$UNPLANNED_FILES" | grep -Ev '^(package-lock\.json|\.ai/.*)?$' | grep -q .; then
              echo "- Unplanned file changes: review required but non-blocking" >> .ai/evaluation.md
            else
              echo "- Unplanned file changes: passed" >> .ai/evaluation.md
            fi

            if printf '%s\n' "$CHANGED_FILES" | grep -qx 'package.json' && ! printf '%s\n' "$CHANGED_FILES" | grep -qx 'package-lock.json'; then
              EVALUATION_STATUS="rejected"
              EVALUATION_REASON="package.json changed without package-lock.json."
              echo "- Dependency lockfile consistency: failed" >> .ai/evaluation.md
            else
              echo "- Dependency lockfile consistency: passed" >> .ai/evaluation.md
            fi

            if npm run build > .ai/build.log 2>&1; then
              echo "- Evaluator final build: passed" >> .ai/evaluation.md
            else
              EVALUATION_STATUS="rejected"
              EVALUATION_REASON="Evaluator final build failed."
              echo "- Evaluator final build: failed" >> .ai/evaluation.md
            fi

            jq -n \
              --argjson approved "$([ "$EVALUATION_STATUS" = "approved" ] && echo true || echo false)" \
              --arg reason "$EVALUATION_REASON" \
              --argjson changed_file_count "$CHANGED_FILE_COUNT" \
              --argjson target_match_count "$TARGET_MATCH_COUNT" \
              --argjson unplanned_file_count "$UNPLANNED_FILE_COUNT" \
              --argjson repair_attempts "$REPAIR_ATTEMPTS" \
              --argjson evaluator_fix_attempts "$EVALUATOR_FIX_ATTEMPTS" \
              --arg changed_files "$(printf '%s\n' "$CHANGED_FILES" | tr '\n' ' ')" \
              --arg matched_target_files "$(printf '%s\n' "$MATCHED_TARGET_FILES" | tr '\n' ' ')" \
              --arg unplanned_files "$(printf '%s\n' "$UNPLANNED_FILES" | tr '\n' ' ')" \
              '{
                approved: $approved,
                reason: $reason,
                metrics: {
                  changed_file_count: $changed_file_count,
                  target_match_count: $target_match_count,
                  unplanned_file_count: $unplanned_file_count,
                  repair_attempts: $repair_attempts,
                  evaluator_fix_attempts: $evaluator_fix_attempts
                },
                checks: {
                  generated_diff: ($changed_file_count > 0),
                  touched_planner_target: ($target_match_count > 0),
                  build_passed: $approved
                },
                changed_files: ($changed_files | split(" ") | map(select(length > 0))),
                matched_target_files: ($matched_target_files | split(" ") | map(select(length > 0))),
                unplanned_files: ($unplanned_files | split(" ") | map(select(length > 0))),
                blocking_issues: (if $approved then [] else [$reason] end)
              }' > .ai/verdict.json
          }

          EVALUATOR_FIX_ATTEMPTS=0
          for EVALUATION_ROUND in 1 2; do
            evaluate_current_diff
            if [ "$EVALUATION_STATUS" = "approved" ]; then
              break
            fi
            if [ "$EVALUATION_ROUND" -eq 2 ]; then
              break
            fi

            EVALUATOR_FIX_ATTEMPTS="$EVALUATION_ROUND"
            {
              echo "# Evaluator fix request"
              echo
              echo "The Evaluator rejected the generated implementation."
              echo "Fix only the issues listed below, then stop. Do not add unrelated features or refactors."
              echo
              echo "## Evaluation"
              cat .ai/evaluation.md
            } > .ai/fix-request.md

            mapfile -t FIX_FILES < <(git diff --name-only -- ':!.ai' | grep -E '\.(ts|tsx|js|jsx|css|json|config\.js)$' || true)
            if [ "${#FIX_FILES[@]}" -eq 0 ]; then
              mapfile -t FIX_FILES < <(sed '/^[[:space:]]*$/d' .ai/target-files.txt)
            fi

            aider "${FIX_FILES[@]}" --message-file .ai/fix-request.md --yes --no-auto-commits

            if ! npm run build > .ai/build.log 2>&1; then
              echo "Generator fix after evaluator rejection did not pass build." >> .ai/evaluation.md
            fi
          done

          if [ "$EVALUATION_STATUS" != "approved" ]; then
            gh issue comment "$ISSUE_NUMBER" --body-file .ai/evaluation.md
            echo "$EVALUATION_REASON"
            exit 1
          fi

          rm -f .ai/build.log .ai/build-sanitized.log .ai/build-focused.log .ai/repair.md .ai/fix-request.md

          # AI_PATがあればworkflowファイル変更にも対応できる。なければGITHUB_TOKENで試す。
          PUSH_TOKEN="${AI_PAT:-${{ secrets.GITHUB_TOKEN }}}"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${{ github.repository }}.git"

          # 変更をステージング
          git add .

          git commit -m "feat: implemented by AI for Issue #${ISSUE_NUMBER}"

          # ブランチをプッシュ
          if ! git push -f origin "$BRANCH_NAME" 2> .ai/push-error.log; then
            {
              echo "Generated implementation passed evaluation, but branch push failed."
              echo
              echo "## Push error"
              echo '```'
              sed -n '1,120p' .ai/push-error.log
              echo '```'
              echo
              echo "This often happens when the generated diff changes files under .github/workflows/ and the token does not have the workflows permission."
            } > .ai/failure-reason.md
            exit 1
          fi

          # PR作成
          export GH_TOKEN="${AI_PAT:-${{ secrets.GITHUB_TOKEN }}}"
          if ! PR_URL="$(gh pr create --title "[AI] ${ISSUE_TITLE}" --body "
          ## 課題の概要
          Closes #${ISSUE_NUMBER}
          Issueに基づき、AIが自律開発を行いました。

          ## Planner output
          - .ai/plan.md
          - .ai/plan.json
          - .ai/target-files.txt

          ## Evaluator output
          - .ai/evaluation.md
          - .ai/verdict.json

          ## 注意事項
          - AI生成コードです。Evaluator を通過した場合のみPR化されています。
          " --base main --head "$BRANCH_NAME" 2> .ai/pr-create-error.log)"; then
            {
              echo "Generated implementation passed evaluation and branch push, but PR creation failed."
              echo
              echo "## PR creation error"
              echo '```'
              sed -n '1,120p' .ai/pr-create-error.log
              echo '```'
            } > .ai/failure-reason.md
            exit 1
          fi

          PR_NUMBER="${PR_URL##*/}"
          jq -n \
            --arg number "$PR_NUMBER" \
            --arg url "$PR_URL" \
            --arg branch "$BRANCH_NAME" \
            --arg issue_number "$ISSUE_NUMBER" \
            '{
              number: ($number | tonumber),
              url: $url,
              branch: $branch,
              issue_number: ($issue_number | tonumber)
            }' > .ai/pr.json

      - name: Upload PR metadata
        uses: actions/upload-artifact@v4
        with:
          name: ai-pr
          path: .ai/pr.json
          include-hidden-files: true
          if-no-files-found: error

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p .ai

          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping Slack notification."
            exit 0
          fi

          ISSUE_NUMBER="unknown"
          ISSUE_TITLE="unknown"
          REASON="AI Generator / Evaluator が停止しました。Actionsログを確認してください。"

          if [ -f .ai/plan.json ]; then
            ISSUE_NUMBER="$(jq -r '.issue_number // "unknown"' .ai/plan.json)"
            ISSUE_TITLE="$(jq -r '.summary // "unknown"' .ai/plan.json)"
          fi
          if [ -f .ai/failure-reason.md ]; then
            REASON="$(sed -n '1,16p' .ai/failure-reason.md | tr '\n' ' ')"
          elif [ -f .ai/verdict.json ]; then
            REASON="$(jq -r '.reason // "Evaluator rejected the implementation."' .ai/verdict.json)"
          elif [ -f .ai/evaluation.md ]; then
            REASON="$(sed -n '1,12p' .ai/evaluation.md | tr '\n' ' ')"
          fi
          REASON="$(printf '%s' "$REASON" | tr '\n' ' ' | cut -c 1-700)"

          jq -n \
            --arg title "AI Generator / Evaluator が停止しました" \
            --arg issue "#${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --arg reason "$REASON" \
            --arg run_url "$RUN_URL" \
            '{
              text: $title,
              blocks: [
                { type: "header", text: { type: "plain_text", text: "AIパイプライン停止" } },
                {
                  type: "section",
                  fields: [
                    { type: "plain_text", text: "フェーズ: Generator / Evaluator" },
                    { type: "plain_text", text: "状態: 失敗" }
                  ]
                },
                { type: "section", text: { type: "plain_text", text: ("Issue: " + $issue) } },
                { type: "section", text: { type: "plain_text", text: ("理由: " + $reason) } },
                { type: "actions", elements: [ { type: "button", text: { type: "plain_text", text: "Actionsログを開く" }, url: $run_url } ] }
              ]
            }' > .ai/slack-failure-payload.json

          curl -sS -X POST \
            -H 'Content-Type: application/json' \
            --data @.ai/slack-failure-payload.json \
            "$SLACK_WEBHOOK_URL"
